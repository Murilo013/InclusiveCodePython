name: Trigger auto deployment for inclusivecodepython

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/inclusivecodepython-AutoDeployTrigger-d35f91ab-ed7a-4c97-9e5b-779821e77ac0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.INCLUSIVECODEPYTHON_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.INCLUSIVECODEPYTHON_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.INCLUSIVECODEPYTHON_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: inclusivecodecntr.azurecr.io
          registryUsername: ${{ secrets.INCLUSIVECODEPYTHON_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.INCLUSIVECODEPYTHON_REGISTRY_PASSWORD }}
          containerAppName: inclusivecodepython
          resourceGroup: InclusiveCode-rg
          imageToBuild: inclusivecodecntr.azurecr.io/inclusivecodepython:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


